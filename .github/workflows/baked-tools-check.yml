name: Baked Tools Check

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile.dockerfile
      - scripts/code-server-entrypoint.sh
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - .github/workflows/baked-tools-check.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile.dockerfile
      - scripts/code-server-entrypoint.sh
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - .github/workflows/baked-tools-check.yml
  workflow_dispatch:

jobs:
  check:
    name: Validate baked tools in image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v6
        with:
          path: builder
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: builder
          file: builder/Dockerfile.dockerfile
          tags: code-server-omp:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify baked commands exist
        run: |
          failures=0
          for cmd in code-server node npm omp docker dockerd gosu dumb-init git curl jq python3 pip; do
            result=$(docker run --rm --entrypoint /bin/bash code-server-omp:test -c "command -v ${cmd}" 2>&1) || true
            if [ -n "${result}" ]; then
              echo "OK: ${cmd} found at ${result}"
            else
              echo "FAIL: ${cmd} not found"
              docker run --rm --entrypoint /bin/bash code-server-omp:test -c "which ${cmd} 2>&1 || echo 'not found'" 2>&1 || true
              failures=$((failures + 1))
            fi
          done
          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} command(s) missing from image"
            exit 1
          fi
          echo "OK: all baked commands found"

      - name: Verify baked tool versions
        run: |
          failures=0
          for cmd in code-server node npm omp docker dockerd git python3; do
            echo "=== ${cmd} --version ==="
            # omp invokes bun internally; use -i so profile.d adds
            # $HOME/.bun/bin (containing bun) to PATH
            i_flag=""; [ "${cmd}" = "omp" ] && i_flag="-i"
            version=$(docker run --rm --entrypoint /bin/bash code-server-omp:test ${i_flag} -c "${cmd} --version 2>&1" || echo "VERSION CHECK FAILED")
            echo "${version}"
            if echo "${version}" | grep -q "VERSION CHECK FAILED"; then
              echo "FAIL: ${cmd} --version failed"
              failures=$((failures + 1))
            fi
          done
          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} version check(s) failed"
            exit 1
          fi
          echo "OK: all version checks passed"

      - name: Verify omp works without manual PATH export (regression check)
        run: |
          echo "=== omp --version (fresh shell, no manual export) ==="
          result=$(docker run --rm --entrypoint /bin/bash code-server-omp:test -i -c 'omp --version' 2>&1 || echo "OMP FAILED")
          echo "${result}"
          if echo "${result}" | grep -qi "No such file or directory\|env.*bun"; then
            echo "FAIL: omp --version failed with 'bun not found'"
            exit 1
          fi
          echo "OK: omp works in fresh shell"

      - name: Verify PATH in fresh shell
        run: |
          expected_paths="/home/coder/.bun/bin /home/coder/.npm-global/bin /home/coder/.local/bin /home/coder/.local/go/bin /home/coder/.go/bin /home/coder/.cargo/bin /home/coder/.local/pip/bin"

          shell_path=$(docker run --rm --entrypoint /bin/bash code-server-omp:test -i -c 'echo "$PATH"' 2>&1)
          echo "Fresh shell PATH: ${shell_path}"

          failures=0
          for dir in ${expected_paths}; do
            if echo "${shell_path}" | tr ':' '\n' | grep -qFx "${dir}"; then
              echo "OK: PATH contains ${dir}"
            else
              echo "FAIL: PATH missing ${dir}"
              failures=$((failures + 1))
            fi
          done

          if [ "${failures}" -gt 0 ]; then
            echo "FAIL: ${failures} path(s) missing from fresh shell PATH"
            exit 1
          fi
          echo "OK: all managed directories in fresh shell PATH"

      - name: Verify entrypoint does not exit immediately (no volumes)
        run: |
          echo "=== Entrypoint startup check ==="
          container_id=$(docker run -d --rm code-server-omp:test 2>&1) || {
            echo "Container failed to start (expected without volumes)"
            echo "OK: quick-start not required"
            exit 0
          }
          sleep 5
          status=$(docker inspect --format '{{.State.Status}}' "${container_id}" 2>/dev/null || echo "gone")
          docker logs "${container_id}" 2>&1 | tail -5 || true
          docker stop "${container_id}" 2>/dev/null || true
          echo "Container status after 5s: ${status}"
          if [ "${status}" = "running" ]; then
            echo "OK: container starts without volumes"
          else
            echo "Container exits without volumes (expected — entrypoint needs /home/coder)"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Baked Tools Check" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Image: code-server-omp:test" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          docker images --filter=reference='code-server-omp:test' --format '{{.CreatedAt}}' | head -1 | while read -r created; do
            echo "Built: ${created}" >> "${GITHUB_STEP_SUMMARY}"
          done
