name: Dependabot Auto-Merge

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ github.token }}"

      - name: Log update details
        env:
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        run: |
          echo "Dependency: ${DEPENDENCY_NAMES}"
          echo "Ecosystem: ${PACKAGE_ECOSYSTEM}"
          echo "Update type: ${UPDATE_TYPE}"
          echo "Dependency type: ${DEPENDENCY_TYPE}"

      - name: Evaluate auto-merge policy
        id: policy
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          allow_automerge=false
          reason=""

          case "${UPDATE_TYPE}" in
            version-update:semver-patch|version-update:semver-minor)
              allow_automerge=true
              reason="auto-merge candidate: ${UPDATE_TYPE}"
              ;;
            version-update:semver-major)
              allow_automerge=false
              reason="major update requires manual review: ${UPDATE_TYPE}"
              ;;
            *)
              allow_automerge=false
              reason="unknown update type: ${UPDATE_TYPE}"
              ;;
          esac

          {
            echo "allow_automerge=${allow_automerge}"
            echo "reason=${reason}"
          } >> "${GITHUB_OUTPUT}"

      - name: Classify changed files and check applicable workflow runs
        id: path_check
        if: steps.policy.outputs.allow_automerge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_OID: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "=== Changed files ==="
          changed=$(gh pr view "${PR_NUMBER}" --json files --jq '.files[].path' 2>/dev/null || echo "")
          if [ -z "${changed}" ]; then
            echo "FAIL: could not list changed files"
            echo "checks_ok=false" >> "$GITHUB_OUTPUT"
            echo "failure_reason=Could not list changed files via API" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "${changed}"

          # Check managed-tools protected paths
          files_safe=true
          while IFS= read -r filepath; do
            case "${filepath}" in
              managed-tools/manifest.json|managed-tools/policy.json|.github/workflows/managed-tools-check.yml|scripts/managed-npm-tools.mjs|scripts/managed-go-tools.mjs|scripts/managed-mounted-tools.mjs|scripts/managed-tools-config.mjs|scripts/managed-tools-output.mjs|scripts/managed-tools-status.mjs|scripts/validate-managed-tools.mjs)
                echo "Protected file changed: ${filepath}"
                files_safe=false
                ;;
            esac
          done <<< "${changed}"

          if [ "${files_safe}" = "false" ]; then
            echo "Managed-tools files changed; manual review required"
            echo "checks_ok=false" >> "$GITHUB_OUTPUT"
            echo "failure_reason=Managed-tools files changed; manual review required" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Classify into path groups
          touches_baked=false
          touches_managed=false

          while IFS= read -r filepath; do
            case "${filepath}" in
              Dockerfile*|scripts/*|scripts/**|bootstrap.sh|package.json|package-lock.json|bun.lock|go.mod|go.sum|tools.go|managed-tools/baked-tools.json|.github/workflows/baked-tools-check.yml|.github/workflows/baked-tools-monitor.yml)
                touches_baked=true
                ;;
              package.json|package-lock.json|go.mod|go.sum|tools.go|scripts/managed-npm-tools.mjs|scripts/managed-go-tools.mjs|scripts/managed-mounted-tools.mjs|scripts/managed-tools-config.mjs|scripts/managed-tools-output.mjs|scripts/managed-tools-status.mjs|scripts/validate-managed-tools.mjs|managed-tools/manifest.json|managed-tools/policy.json|.github/workflows/managed-tools-check.yml)
                touches_managed=true
                ;;
            esac
          done <<< "${changed}"

          echo "touches_baked=${touches_baked}"
          echo "touches_managed=${touches_managed}"

          required_checks=""
          if [ "${touches_baked}" = "true" ]; then
            required_checks="${required_checks} Validate baked tools in image,Monitor baked tool versions,"
          fi
          if [ "${touches_managed}" = "true" ]; then
            required_checks="${required_checks} Install & verify managed tools,"
          fi

          echo "required_checks=${required_checks}" >> "$GITHUB_OUTPUT"
          echo "touches_baked=${touches_baked}" >> "$GITHUB_OUTPUT"
          echo "touches_managed=${touches_managed}" >> "$GITHUB_OUTPUT"

          if [ -z "${required_checks}" ]; then
            echo "checks_ok=true" >> "$GITHUB_OUTPUT"
            echo "failure_reason=" >> "$GITHUB_OUTPUT"
            echo "No path-specific checks required (docs-only or other change)"
            exit 0
          fi

          IFS=',' read -ra checks <<< "${required_checks}"
          checks_ok=true
          failure_reason=""

          checks_json=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_OID}/check-runs" --jq '.check_runs' 2>/dev/null || echo "[]")

          for check_name in "${checks[@]}"; do
            check_name=$(echo "${check_name}" | xargs)
            echo "Checking: ${check_name}"

            conclusion=$(echo "${checks_json}" | jq -r --arg name "${check_name}" '.[] | select(.name == $name) | .conclusion // empty' | head -1)

            if [ -z "${conclusion}" ]; then
              echo "  MISSING: no check run found for '${check_name}'"
              checks_ok=false
              failure_reason="${failure_reason} Required path-specific check '${check_name}' not found;"
            elif [ "$(echo "${conclusion}" | tr '[:upper:]' '[:lower:]')" != "success" ]; then
              echo "  NOT SUCCESS: ${check_name} = ${conclusion}"
              checks_ok=false
              failure_reason="${failure_reason} Required path-specific check '${check_name}' is ${conclusion};"
            else
              echo "  OK: ${check_name} = SUCCESS"
            fi
          done

          echo "checks_ok=${checks_ok}" >> "$GITHUB_OUTPUT"
          echo "failure_reason=${failure_reason}" >> "$GITHUB_OUTPUT"

      - name: Skip auto-merge
        if: steps.policy.outputs.allow_automerge != 'true' || steps.path_check.outputs.checks_ok != 'true'
        run: |
          echo "Not enabling auto-merge."
          echo "Update-type allowed: ${{ steps.policy.outputs.allow_automerge }} (${{ steps.policy.outputs.reason }})"
          echo "Path checks OK: ${{ steps.path_check.outputs.checks_ok }}"
          echo "Failure reason: ${{ steps.path_check.outputs.failure_reason }}"

      - name: Enable native GitHub auto-merge
        if: steps.policy.outputs.allow_automerge == 'true' && steps.path_check.outputs.checks_ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "${PR_URL}" --auto --squash
